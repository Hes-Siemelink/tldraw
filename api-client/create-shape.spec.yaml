Input parameters:
  room:
    default: my-room
  parentId:
    default: null
  text:
    default: New shape

Connect to: TLDraw

POST: 
  path: /${room}/shapes
  body: 
    x: 120
    y: 250
    width: 180
    height: 100
    color: red
    text: ${text}
    parentId: ${parentId}

On error:
  Print: ${error}